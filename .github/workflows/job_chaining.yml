name: Job Chaining
on:
  workflow_dispatch:

jobs:
  job_1:
    runs-on: ubuntu-latest
    steps:
      - name: "job 1"
        run: "echo Job: ${{ github.job }}"
        shell: bash
  
  job_2:
    runs-on: ubuntu-latest
    needs: job_1
    steps:
      - name: "job 2"  
        run: "echo Job: ${{ github.job }}"
        shell: bash  # python,
  
  job_3:
    runs-on: ubuntu-latest
    needs: job_1
    steps:
      - name: "job 3"
        run: "echo Job: ${{ github.job }}"
  
  job_4:
   runs-on: ubuntu-latest
   needs: [job_2, job_3]
   steps:
     - name: "job_4"
       run: "echo Job: ${{ github.job}}"
    
